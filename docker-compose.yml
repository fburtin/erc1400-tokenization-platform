services:
  postgres:
    image: postgres:16-alpine
    container_name: tokenization-permission-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: tokenization_permission_api
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  api:
    build: .
    container_name: tokenization-permission-api
    depends_on:
      - postgres
    environment:
      NODE_ENV: development
      PORT: 3000
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/tokenization_permission_api?schema=public
      JWT_SECRET: change-me-in-production
      JWT_EXPIRES_IN: 8h
    ports:
      - "3000:3000"
    command: sh -c "npx prisma migrate deploy || true && npm run dev"
    volumes:
      - .:/app
      - /app/node_modules

volumes:
  postgres_data:
